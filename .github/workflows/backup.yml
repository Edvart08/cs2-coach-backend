name: Daily Backup

on:
  schedule:
    # Каждый день в 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Можно запустить вручную из GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch backup from Render
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          curl -f "${BACKEND_URL}/admin/backup?token=${ADMIN_TOKEN}" \
            -o backup_latest.json
          echo "Backup fetched: $(wc -c < backup_latest.json) bytes"

      - name: Save with timestamp
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          cp backup_latest.json backups/backup_${DATE}.json
          # Оставляем только последние 30 бэкапов
          ls -t backups/backup_*.json | tail -n +31 | xargs -r rm

      - name: Commit and push
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@cs2coach"
          git add backups/ backup_latest.json
          git diff --staged --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push
